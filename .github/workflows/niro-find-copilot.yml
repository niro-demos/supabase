name: Niro Find (copilot)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: niro-find-copilot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  find:
    name: Pentest and report findings
    runs-on: ubuntu-latest
    timeout-minutes: 300
    # Niro's config dir. Change it in this one place (e.g. niro-staging) and
    # the install, run, proposal, and artifact upload below all follow.
    env:
      NIRO_CONFIG_DIR: niro

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install approved Niro configuration
        uses: niro-demos/niro-configs/.github/actions/install@8c1cc4a6a127684d1395740a74faa5f9128d3a08
        with:
          repository: ${{ github.repository }}
          niro-dir: ${{ env.NIRO_CONFIG_DIR }}
          install-root: ${{ github.workspace }}

      - name: Install Niro
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/apxlabs-ai/niro/main/install.sh | sh

      - name: Verify Niro config proposal credentials
        shell: bash
        env:
          NIRO_APP_CLIENT_ID: ${{ secrets.NIRO_APP_CLIENT_ID }}
          NIRO_APP_PRIVATE_KEY: ${{ secrets.NIRO_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$NIRO_APP_CLIENT_ID" ] || [ -z "$NIRO_APP_PRIVATE_KEY" ]; then
            echo "::error::NIRO_APP_CLIENT_ID and NIRO_APP_PRIVATE_KEY are required"
            exit 1
          fi

      # Codex/Copilot setup and other CI settings:
      # https://github.com/apxlabs-ai/niro/blob/main/docs/ci-environment.md
      - name: Run Niro
        shell: bash
        env:
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COPILOT_PROVIDER_API_KEY: ${{ secrets.COPILOT_PROVIDER_API_KEY }}
          COPILOT_PROVIDER_BASE_URL: https://openrouter.ai/api/v1
          COPILOT_PROVIDER_TYPE: openai
          COPILOT_MODEL: z-ai/glm-5.2
        run: |
          niro find \
            --autonomous \
            --agent=copilot \
            --goal="Pentest this application" \
            --config-dir="$NIRO_CONFIG_DIR" \
            --include-findings=true \
            --upload-debug-logs=true

      - name: Create Niro config catalog token
        id: niro-configs-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.NIRO_APP_CLIENT_ID }}
          private-key: ${{ secrets.NIRO_APP_PRIVATE_KEY }}
          owner: niro-demos
          repositories: niro-configs

      - name: Propose Niro configuration update
        uses: niro-demos/niro-configs/.github/actions/propose@5e67fd8f39949c992af0abcd6efebb1a685353cf
        with:
          catalog-token: ${{ steps.niro-configs-token.outputs.token }}
          source-token: ${{ github.token }}
          archive: ${{ github.workspace }}/${{ env.NIRO_CONFIG_DIR }}/artifacts/knowledge.tar
          repository: ${{ github.repository }}
          niro-dir: ${{ env.NIRO_CONFIG_DIR }}
          source-sha: ${{ github.sha }}
          source-run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Upload the report as its own artifact, separate from knowledge.tar, and
      # with archive: false so the download is the PDF itself rather than a zip.
      - name: Upload Niro penetration-test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.NIRO_CONFIG_DIR }}/artifacts/penetration-test-report.pdf
          archive: false
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Niro knowledge
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: niro-knowledge
          path: ${{ env.NIRO_CONFIG_DIR }}/artifacts/knowledge.tar
          if-no-files-found: ignore
          retention-days: 30

      # Demo workflows retain this unsafe bundle for short-lived troubleshooting.
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: niro-debug-logs-unsafe
          path: niro-debug-logs.tar
          if-no-files-found: ignore
          retention-days: 7
